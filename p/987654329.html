        <p>十个月，四十多个星期，三百多个日日夜夜！！ 我，感觉似乎已经过了三百多年，但又似乎是弹指一瞬间。曾经的过去，过去的曾经，痛过，哭过，恨过，也悔过，可最终还是没有放弃过。曾经的风风雨雨，现在已经一路走过，过去的迷茫与痛苦，只为了化为现在的清晰与坚强。现在回首，这一切都只不过是人生的一朵小小的很小的浪花，笑一笑就没了，真正的大浪花还在等我。 如今。。暴风雨过后，阴风怒号了三百多天的天空能否霞光万丈 ？瓜蒂已落，瓜是否已熟？渠已修成，水会来吗？？ 但愿。。三百多天的破茧能化作彩蝶翩翩起舞。。</p>
